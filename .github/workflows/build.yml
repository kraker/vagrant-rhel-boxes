name: Build Vagrant boxes

on:
  workflow_dispatch:
  push:
    tags: ['v*']

# One run per branch. Keeps the matrix from racing itself when commits
# land back-to-back; lets different branches build concurrently.
concurrency:
  group: image-builder-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, linux]
    strategy:
      fail-fast: false
      matrix:
        provider: [libvirt, virtualbox]
        distro: [rhel-10.0, rhel-9.6]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync Python deps
        run: uv sync --frozen

      - name: Build ${{ matrix.distro }} ${{ matrix.provider }} box
        run: |
          version="0.0.1"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          fi
          uv run ansible-playbook build_box.yml \
            -e provider=${{ matrix.provider }} \
            -e distro=${{ matrix.distro }} \
            -e box_version="$version"

      - name: Upload box + manifest
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.distro }}-vagrant-${{ matrix.provider }}
          path: build/${{ matrix.distro }}-vagrant-${{ matrix.provider }}-*
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, linux]
    strategy:
      fail-fast: false
      matrix:
        provider: [libvirt, virtualbox]
        distro: [rhel-10.0, rhel-9.6]
    env:
      HCP_CLIENT_ID: ${{ secrets.HCP_CLIENT_ID }}
      HCP_CLIENT_SECRET: ${{ secrets.HCP_CLIENT_SECRET }}
    steps:
      - name: Download box artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.distro }}-vagrant-${{ matrix.provider }}
          path: build/

      - name: Publish ${{ matrix.distro }} ${{ matrix.provider }} box
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          distro="${{ matrix.distro }}"
          box_family="${distro%.*}"
          box="build/${distro}-vagrant-${{ matrix.provider }}-x86_64.box"
          vagrant cloud publish "kraker/${box_family}" "$version" \
            ${{ matrix.provider }} "$box" \
            --architecture amd64 --release --no-direct-upload -f
