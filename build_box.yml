---

- name: Build a RHEL Vagrant box with image-builder
  hosts: localhost
  become: true
  vars:
    blueprint_path: "blueprints/{{ distro | default('rhel-10.0') }}.toml"
    output_dir: "build/"
    box_name: kraker/rhel-10

  tasks:
    - name: Install image-builder
      ansible.builtin.dnf:
        name: image-builder
        state: present

    - name: Build the Vagrant box (several minutes)
      ansible.builtin.command:
        cmd: >-
          image-builder build vagrant-{{ provider | default('libvirt') }}
          --blueprint {{ blueprint_path }}
          --output-dir "{{ output_dir }}"
          --with-manifest
      changed_when: true
      # Ignore errors so that file ownership is still reclaimed.
      ignore_errors: true

    # image-builder runs as root; chown so non-root tasks (vagrant box add,
    # CI artifact upload) can read the .box.
    - name: Reclaim ownership of build artifacts
      ansible.builtin.file:
        path: "{{ output_dir }}"
        state: directory
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"
        recurse: true

