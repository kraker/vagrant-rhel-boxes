---

- name: Build a RHEL Vagrant box with image-builder
  hosts: localhost
  become: true
  vars:
    blueprint_path: "blueprints/{{ distro | default('rhel-10.0') }}.toml"
    output_dir: "build/"
    box_name: kraker/rhel-10

  tasks:
    - name: Install image-builder
      ansible.builtin.dnf:
        name: image-builder
        state: present

    # image-builder runs as root; the always: block chowns artifacts back so
    # non-root tasks (vagrant box add, CI artifact upload) can read them
    # whether the build succeeded or failed.
    - name: Build the Vagrant box and reclaim ownership
      block:
        - name: Build the Vagrant box (several minutes)
          ansible.builtin.command:
            cmd: >-
              image-builder build vagrant-{{ provider | default('libvirt') }}
              --blueprint {{ blueprint_path }}
              --output-dir "{{ output_dir }}"
              --with-manifest
          changed_when: true
      always:
        - name: Reclaim ownership of build artifacts
          ansible.builtin.file:
            path: "{{ output_dir }}"
            state: directory
            owner: "{{ ansible_user_id }}"
            group: "{{ ansible_user_id }}"
            recurse: true

